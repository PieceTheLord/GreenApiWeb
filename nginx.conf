server {
    listen 80;
    server_name _; # Отвечаем на любой домен, который прислал Traefik

    # Убираем все редиректы и SSL блоки!

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # Бонус: хорошая практика для SPA (React/Vue) или просто чтобы не было 404
        try_files $uri $uri/ /index.html;
    }

    # Можно добавить логи для отладки
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
}