

services:
  green-api-web:
    # Image for GitHub actions deploying
    image: ghcr.io/piecethelord/greenapiweb:latest
    container_name: green-api-frontend
    # Set volumes for our ssl certs to allow https connections
    volumes:
      - /etc/letsencrypt/live/alexey-web-dev.ru/fullchain.pem:/etc/nginx/ssl/fullchain.pem:ro
      - /etc/letsencrypt/live/alexey-web-dev.ru/privkey.pem:/etc/nginx/ssl/privkey.pem:ro
    restart: always
    networks:
      - web
    labels:
      - "traefik.enable=true"
      # 1. Point out the domen
      - "traefik.http.routers.greenapi.rule=Host(`greenapi.alexey-web-dev.ru`)"
      # 2. Get the Traffic by http
      # - "traefik.http.routers.greenapi.entrypoints=web"
      - "traefik.http.routers.greenapi.entrypoints=web,websecure" # Изменили web на websecure
      - "traefik.http.routers.greenapi.tls.certresolver=myresolver" # Сказали выпустить SSL!
      # 3. Point out to Traefik the port of our app
      - "traefik.http.services.greenapi.loadbalancer.server.port=80"

networks:
  web:
    external: true